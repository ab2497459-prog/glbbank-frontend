name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      name: CI

      on:
        push:
          branches: [ main, master ]
        pull_request:
          branches: [ main, master ]

      jobs:
        test:
          runs-on: ubuntu-latest
          env:
            SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
            JWT_SECRET: ${{ secrets.JWT_SECRET }}
          steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 24
              uses: actions/setup-node@v4
              with:
                node-version: '24'

            - name: Install Chromium dependencies (for Puppeteer)
              if: runner.os == 'Linux'
              run: |
                sudo apt-get update
                sudo apt-get install -y --no-install-recommends \
                  ca-certificates fonts-liberation libasound2 libatk1.0-0 libc6 libcairo2 \
                  libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 \
                  libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libx11-6 libx11-xcb1 \
                  libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 \
                  libxrandr2 libxrender1 libxss1 libxtst6 xdg-utils wget

            - name: Install backend deps
              working-directory: backend
              run: |
                npm ci --no-audit --no-fund

            - name: Install Puppeteer for E2E
              working-directory: backend
              run: |
                npm install --no-audit --no-fund puppeteer@21.11.0

            - name: Run API smoke tests
              working-directory: backend
              run: node test_api.js

            - name: Run programmatic UI E2E
              working-directory: backend
              run: node test_ui_e2e.js

            - name: Run headless Puppeteer UI test
              working-directory: backend
              run: node ui_e2e/puppeteer_login_test.js
