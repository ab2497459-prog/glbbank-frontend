name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Chromium dependencies (for Puppeteer)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -yq --no-install-recommends \
            ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 \
            libatk1.0-0 libcups2 libdrm2 libdbus-1-3 libexpat1 libfontconfig1 \
            libgbm1 libglib2.0-0 libgtk-3-0 libnss3 libpango1.0-0 libpangocairo-1.0-0 \
            libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 \
            libxi6 libxrandr2 libxrender1 libxss1 libxshmfence1 libxtst6 libxkbcommon0 \
            libxcb1 libappindicator3-1 xdg-utils wget
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install backend deps
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund

      - name: Start backend server
        working-directory: backend
        run: |
          nohup npm start > server.log 2>&1 &
          for i in {1..15}; do
            if curl -sSf http://127.0.0.1:5000/health >/dev/null 2>&1; then
              echo "backend ready"
              break
            fi
            sleep 1
          done
          curl -sSf http://127.0.0.1:5000/health

      - name: Run API smoke tests
        working-directory: backend
        run: node test_api.js

      - name: Run programmatic UI E2E
        working-directory: backend
        run: node test_ui_e2e.js

      - name: Run headless Puppeteer UI test
        working-directory: backend
        run: node ui_e2e/puppeteer_login_test.js
